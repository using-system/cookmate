name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Opt JavaScript actions into the Node 24 runtime ahead of the forced
  # GitHub Actions transition. Needed because mathieudutour/github-tag-action
  # still declares "using: node20" on its latest release (v6.2).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Compute next tag
        id: tag
        uses: mathieudutour/github-tag-action@d28fa2ccfbd16e871a4bdf35e11b3ad1bd56c0c1 # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v

  build-android:
    name: Build Android APK
    needs: version
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.version.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is missing or empty." >&2
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
          } > android/key.properties
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: |
          BUILD_NAME="${TAG#v}"
          flutter build apk --release \
            --build-name="${BUILD_NAME}" \
            --build-number="${GITHUB_RUN_NUMBER}"
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/cookmate-${TAG}.apk"
      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cookmate-apk
          path: build/app/outputs/flutter-apk/cookmate-*.apk
          retention-days: 7
          if-no-files-found: error

  release:
    name: Release
    needs: [version, build-android]
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cookmate-apk
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          generate_release_notes: true
          files: artifacts/cookmate-*.apk
